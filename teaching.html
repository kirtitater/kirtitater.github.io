<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Teaching | Kirti Tater</title>

  <style>
    :root {
      --primary: #475c66;
      --text: #222;
      --muted: #555;
      --background: #fafafa;
      --white: #ffffff;
      --border: #e3e6e8;
      --link: #1f5f8b;
      --nav-hover: #f1f4f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--background);
    }

    .header {
      background-color: var(--primary);
      color: var(--white);
      padding: 34px 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .navbar {
      background-color: var(--white);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }

    .navbar a {
      display: block;
      color: var(--text);
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 16px;
      border-bottom: 3px solid transparent;
    }

    .navbar a:hover,
    .navbar a:focus {
      background-color: var(--nav-hover);
      color: var(--primary);
    }

    .navbar a.active {
      color: var(--primary);
      font-weight: 600;
      border-bottom-color: var(--primary);
    }

    .content {
      max-width: 900px;
      margin: 42px auto;
      padding: 0 20px;
    }

    h2 {
      margin: 0 0 28px;
      font-size: 28px;
      color: var(--primary);
    }

    h3 {
      margin-top: 34px;
      margin-bottom: 14px;
      padding-bottom: 6px;
      font-size: 20px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .teaching-entry {
      background-color: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 22px;
      margin-bottom: 20px;
    }

    .role {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .institution {
      color: var(--muted);
      margin-bottom: 14px;
    }

    .course-list {
      margin: 0;
      padding-left: 22px;
    }

    .course-list li {
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 28px;
      }

      .nav-inner {
        justify-content: center;
        flex-wrap: wrap;
      }

      .navbar a {
        padding: 12px 10px;
        font-size: 15px;
      }

      .content {
        margin-top: 32px;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <h1>Kirti Tater</h1>
  </header>

  <nav class="navbar" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html">Home</a>
      <a href="cv.html">CV</a>
      <a href="research.html">Research</a>
      <a href="teaching.html" class="active">Teaching</a>
    </div>
  </nav>

  <main class="content">
    <h2>Teaching</h2>

    <section>
      <h3>Teaching Experience</h3>

      <div class="teaching-entry">
        <div class="role">Teaching Assistant</div>
        <div class="institution">Shiv Nadar Institution of Eminence</div>

        <ul class="course-list">
          <li>Intermediate Microeconomics</li>
          <li>Principles of Macroeconomics</li>
          <li>Introductory Econometrics</li>
          <li>Advanced Econometrics</li>
        </ul>
      </div>
    </section>
  </main>

</body>
</html>
